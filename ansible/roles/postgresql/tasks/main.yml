---
# ---- CLEAN OLD BROKEN REPO (important if previous runs failed)
- name: Remove old pgdg repo if exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pgdg.list
    state: absent

# ---- PREREQUISITES
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - curl
      - python3-psycopg2
    state: present
    update_cache: yes

# ---- KEY (atomic, no race)
- name: Install PostgreSQL GPG key
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
    | gpg --dearmor \
    | tee /usr/share/keyrings/postgresql.gpg > /dev/null
  args:
    creates: /usr/share/keyrings/postgresql.gpg

- name: Ensure key permissions
  ansible.builtin.file:
    path: /usr/share/keyrings/postgresql.gpg
    owner: root
    group: root
    mode: '0644'

# ---- VERIFY KEY (prevents silent failures)
- name: Check PostgreSQL key exists
  ansible.builtin.stat:
    path: /usr/share/keyrings/postgresql.gpg
  register: pg_key

- name: Fail if key missing
  ansible.builtin.fail:
    msg: "PostgreSQL GPG key installation failed"
  when: not pg_key.stat.exists

# ---- REPO (NO auto update)
- name: Add PostgreSQL repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt {{ ansible_facts.distribution_release }}-pgdg main"
    filename: pgdg
    state: present
    update_cache: no

# ---- UPDATE CACHE ONLY AFTER KEY IS READY
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

# ---- INSTALL POSTGRESQL
- name: Install PostgreSQL {{ postgresql_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - "postgresql-contrib-{{ postgresql_version }}"
    state: present
  notify: Restart PostgreSQL

# ---- SERVICE
- name: Ensure PostgreSQL started
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: yes

# ---- CONFIG
- name: Configure listen_addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = 'localhost'"
  notify: Restart PostgreSQL

- name: Configure password encryption
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: "^#?password_encryption"
    line: "password_encryption = scram-sha-256"
  notify: Restart PostgreSQL

- name: Configure pg_hba.conf safely
  ansible.builtin.blockinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      local   all             all                                     peer
      host    all             all             127.0.0.1/32            scram-sha-256
      host    all             all             ::1/128                 scram-sha-256
  notify: Restart PostgreSQL

- name: Apply config changes immediately
  meta: flush_handlers

# ---- DATABASE / USER (idempotent)
- name: Ensure DB user exists
  become_user: postgres
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    encrypted: true

- name: Ensure database exists
  become_user: postgres
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
    encoding: UTF8
