---
# =========================
# RELEASE SETUP
# =========================

- name: Generate release id
  command: date +%Y%m%d%H%M%S
  register: release_ts
  changed_when: false

- name: Set release variables
  set_fact:
    release_id: "{{ release_ts.stdout }}"
    release_path: "{{ app_releases_dir }}/{{ release_ts.stdout }}"
    artifact_path: "/tmp/{{ release_ts.stdout }}.tar.gz"

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_deploy_user }}"
    group: www-data
    mode: "0755"
  loop:
    - "{{ app_releases_dir }}"
    - "{{ app_shared_dir }}"
    - "{{ app_shared_dir }}/storage"

# =========================
# ARTIFACT UPLOAD (FROM LOCAL MACHINE)
# =========================

- name: Upload artifact to VPS
  copy:
    src: "{{ app_local_artifact }}"
    dest: "{{ artifact_path }}"
    mode: "0644"

# =========================
# EXTRACT RELEASE
# =========================

- name: Create release directory
  file:
    path: "{{ release_path }}"
    state: directory
    owner: "{{ app_deploy_user }}"
    group: www-data

- name: Extract artifact
  unarchive:
    src: "{{ artifact_path }}"
    dest: "{{ release_path }}"
    remote_src: yes
    owner: "{{ app_deploy_user }}"
    group: www-data

# =========================
# CLEAN ARTIFACT
# =========================

- name: Remove uploaded artifact
  file:
    path: "{{ artifact_path }}"
    state: absent

# =========================
# SHARED LINKS
# =========================

- name: Remove local storage directories
  file:
    path: "{{ release_path }}/{{ item }}"
    state: absent
  loop:
    - storage

- name: Link shared storage
  file:
    src: "{{ app_shared_dir }}/storage"
    dest: "{{ release_path }}/storage"
    state: link
    force: yes

- name: Ensure bootstrap/cache is writable
  file:
    path: "{{ release_path }}/bootstrap/cache"
    state: directory
    owner: "{{ app_deploy_user }}"
    group: www-data
    mode: "0775"

# =========================
# ENV FILE
# =========================

- name: Create .env
  template:
    src: env.j2
    dest: "{{ release_path }}/.env"
    owner: "{{ app_deploy_user }}"
    group: www-data
    mode: "0640"

# =========================
# COMPOSER (ONLY IF NOT PREBUILT)
# =========================

- name: Install composer dependencies (optional fallback)
  become_user: "{{ app_deploy_user }}"
  command: composer install --no-dev --optimize-autoloader --no-interaction
  args:
    chdir: "{{ release_path }}"
  when: composer_not_built_in_ci | default(false)


# =========================
# VALIDATE ARTIFACT
# =========================

- name: Ensure vendor exists from artifact
  stat:
    path: "{{ release_path }}/vendor/autoload.php"
  register: vendor_check

- name: Fail if vendor missing
  fail:
    msg: "Artifact is invalid: vendor not present. Build pipeline broken."
  when: not vendor_check.stat.exists

# =========================
# LARAVEL MIGRATIONS
# =========================

- name: Validate artifact integrity
  stat:
    path: "{{ release_path }}/vendor/autoload.php"
  register: vendor_check

- name: Clear Laravel configuration cache
  command: "{{ php_binary }} artisan config:clear"
  args:
    chdir: "{{ release_path }}"
  changed_when: false
  failed_when: false

- name: Run migrations
  command: "{{ php_binary }} artisan migrate --force --no-interaction"
  args:
    chdir: "{{ release_path }}"
  environment:
    APP_ENV: "{{ env }}"
  register: migrate_result
  retries: 2
  delay: 5
  until: migrate_result.rc == 0

# =========================
# OPTIMIZATION
# =========================

- name: Optimize Laravel
  command: "{{ php_binary }} artisan {{ item }}"
  args:
    chdir: "{{ release_path }}"
  loop:
    - config:cache
    - route:cache
    - view:cache
    - event:cache
  changed_when: false

# =========================
# STORAGE LINK
# =========================

- name: Create storage link
  command: "{{ php_binary }} artisan storage:link"
  args:
    chdir: "{{ release_path }}"
  changed_when: false
  failed_when: false

# =========================
# SWITCH RELEASE (ZERO DOWNTIME)
# =========================

- name: Update current symlink
  file:
    src: "{{ release_path }}"
    dest: "{{ app_current_link }}"
    state: link
    force: yes

# =========================
# CLEAN OLD RELEASES
# =========================

- name: Remove old releases
  shell: |
    ls -1dt {{ app_releases_dir }}/* | tail -n +{{ app_release_keep + 1 }} | xargs -r rm -rf
  changed_when: false
