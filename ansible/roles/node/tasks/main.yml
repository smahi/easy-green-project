---
# Node.js Installation & Vite Build
- name: Create keyrings directory
  file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'

- name: Download and install NodeSource GPG key
  shell: |
    wget -qO /tmp/nodesource.gpg.key https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
    rm -f /tmp/nodesource.gpg.key
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Add NodeSource repository (Node.js 22 LTS)
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    state: present
    filename: nodesource
    update_cache: yes

- name: Install Node.js and npm
  apt:
    name:
      - nodejs
    state: present

- name: Verify Node.js version
  command: node --version
  register: node_version
  changed_when: false

- name: Install npm dependencies for release
  become_user: "{{ app_deploy_user }}"
  command: npm ci
  args:
    chdir: "{{ release_path }}"
  when: node_version.rc == 0

- name: Build Vite assets
  become_user: "{{ app_deploy_user }}"
  command: npm run build
  args:
    chdir: "{{ release_path }}"
  environment:
    NODE_ENV: production
