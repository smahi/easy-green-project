---
# System Hardening & Base Packages
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Upgrade installed packages
  apt:
    upgrade: dist
    autoremove: yes
  when: system_upgrade_packages | bool

- name: Install base system packages
  apt:
    name:
      - acl
      - ufw
      - fail2ban
      - curl
      - git
      - rsync
      - unzip
      - zip
      - supervisor
      - python3-psycopg2
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present

- name: Configure UFW — allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW — allow HTTP (80)
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW — allow HTTPS (443)
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW (if not already enabled)
  ufw:
    state: enabled
    policy: deny
  when: env == "production"

- name: Deploy fail2ban SSH jail
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Create deploy user
  user:
    name: "{{ app_deploy_user }}"
    shell: /bin/bash
    groups: www-data
    append: yes
    create_home: yes
    system: no

- name: Check whether swap file exists
  stat:
    path: "{{ swap_file_path }}"
  register: swap_file

- name: Inspect swap file signature
  command: "file -s {{ swap_file_path }}"
  register: swap_signature
  changed_when: false
  failed_when: false
  when: swap_file.stat.exists

- name: Create swap file
  command: "fallocate -l {{ swap_file_size }} {{ swap_file_path }}"
  when: not swap_file.stat.exists

- name: Set permissions on swap file
  file:
    path: "{{ swap_file_path }}"
    mode: "0600"

- name: Initialize swap file
  command: "mkswap {{ swap_file_path }}"
  register: mkswap_result
  when: not swap_file.stat.exists or ('swap file' not in (swap_signature.stdout | default('') | lower))

- name: Persist swap in fstab
  mount:
    name: none
    src: "{{ swap_file_path }}"
    fstype: swap
    opts: sw
    state: present

- name: Enable swap
  command: "swapon {{ swap_file_path }}"
  when:
    - ansible_swaptotal_mb | int == 0
    - not swap_file.stat.exists or ('swap file' in (swap_signature.stdout | default('') | lower)) or (mkswap_result is defined and mkswap_result is changed)
