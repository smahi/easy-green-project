---
# Caddy Server Installation & Configuration
- name: Install Caddy from Ubuntu repositories
  apt:
    name:
      - caddy
    state: present
  notify: Restart caddy

- name: Check what is using port 80
  ansible.builtin.shell: ss -tulpn | grep ':80 ' || true
  register: port80_check
  changed_when: false

- name: Show port 80 usage
  ansible.builtin.debug:
    var: port80_check.stdout_lines

- name: Stop common web servers
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - nginx
    - apache2
  ignore_errors: true

- name: Kill processes using port 80
  ansible.builtin.shell: |
    fuser -k 80/tcp || true
  changed_when: false


- name: Start and enable Caddy
  service:
    name: caddy
    state: started
    enabled: yes

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --adapter caddyfile --config %s"
  notify: Reload caddy
