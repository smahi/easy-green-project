---
# Caddy Server Installation & Configuration
- name: Install Caddy from Ubuntu repositories
  apt:
    name:
      - caddy
    state: present
  notify: Restart caddy

- name: Start and enable Caddy
  service:
    name: caddy
    state: started
    enabled: yes

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --adapter caddyfile --config %s"
  notify: Reload caddy
