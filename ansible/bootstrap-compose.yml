---
# ansible/bootstrap-compose.yml
#
# One-time Podman bootstrap for a hardened host. Run this after harden.yml and
# a reboot, then use deploy-compose.yml for application releases.
#
# Usage:
#   ansible-playbook ansible/bootstrap-compose.yml -i ansible/inventory/staging.ini
#   ansible-playbook ansible/bootstrap-compose.yml -i ansible/inventory/production.ini
#
# Run order:
#   harden.yml -> reboot -> bootstrap-compose.yml -> deploy-compose.yml

- name: Bootstrap VM for Podman Compose deployment
  hosts: staging
  become: true             # needs sudo for sysctl + apt

  vars:
    deploy_user: ubuntu
    project_root: "/home/{{ deploy_user }}/easy-green-project"
    deploy_dir:   "{{ project_root }}/backend"
    containers_conf_dir: "/home/{{ deploy_user }}/.config/containers"

  tasks:

    # ── 1. system packages ────────────────────────────────────────────────────
    - name: Install Podman and Podman Compose and rsync
      ansible.builtin.apt:
        name:
          - podman
          - podman-compose
          - rsync
        state: present
        update_cache: true

    # ── 2. allow binding to port 80 (rootless) ────────────────────────────────
    - name: Allow unprivileged port binding from port 80
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: "80"
        state: present
        sysctl_file: /etc/sysctl.d/99-podman-ports.conf
        reload: true

    # ── 3. fix DNS inside build containers ────────────────────────────────────
    - name: Ensure user containers config directory exists
      ansible.builtin.file:
        path: "{{ containers_conf_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"

    - name: Write containers.conf with reliable DNS
      ansible.builtin.copy:
        dest: "{{ containers_conf_dir }}/containers.conf"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0644"
        content: |
          [containers]
          dns = ["1.1.1.1", "8.8.8.8"]

    # ── 4. configure unqualified image search registries ─────────────────────
    # Without this, Podman refuses short image names (e.g. "composer:2",
    # "node:22-alpine") in Dockerfiles and compose files on fresh installs.
    # Written system-wide so it applies to all users including root.
    - name: Ensure /etc/containers directory exists
      ansible.builtin.file:
        path: /etc/containers
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write /etc/containers/registries.conf
      ansible.builtin.copy:
        dest: /etc/containers/registries.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          # /etc/containers/registries.conf
          # Managed by Ansible — bootstrap-compose.yml
          #
          # Registries searched in order when a short image name is used.
          # e.g. "composer:2"         -> docker.io/library/composer:2
          #      "dunglas/frankenphp" -> docker.io/dunglas/frankenphp
          #
          # NOTE: [[registry]] blocks require a location= field to be valid.
          # For simple search order, this single line is all that is needed.

          unqualified-search-registries = ["docker.io", "ghcr.io", "quay.io"]

    # ── 5. create project directories ─────────────────────────────────────────
    - name: Create project and backend directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - "{{ project_root }}"
        - "{{ deploy_dir }}"
        - "{{ deploy_dir }}/backups"

    # ── 6. enable Podman socket for the deploy user ───────────────────────────
    - name: Enable Podman socket (user service)
      ansible.builtin.systemd:
        name: podman.socket
        enabled: true
        state: started
        scope: user
      become: true
      become_user: "{{ deploy_user }}"

    - name: Allow user services to run without login (linger)
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ deploy_user }}"
      changed_when: false

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: >
          VM is ready.
          Podman can now pull short image names from docker.io, ghcr.io, and quay.io.
          Run deploy-compose.yml to deploy the app.
