---
# ansible/rollback.yml
#
# Legacy rollback helper for the older release/symlink deployment model.
# It is not part of the current Podman pod workflow documented in
# ansible/README.md. Prefer restore-backup.yml for the current setup unless
# you intentionally maintain the previous release-based layout.
#
- name: Rollback Laravel release
  hosts: all
  become: yes
  gather_facts: no

  vars_files:
    - vault.yml

  tasks:

    - name: Get previous release
      shell: |
        ls -1dt {{ app_releases_dir }}/* | sed -n '2p'
      register: previous_release
      changed_when: false

    - name: Fail if no previous release exists
      fail:
        msg: "No previous release found"
      when: previous_release.stdout == ""

    - name: Switch current symlink to previous release
      file:
        src: "{{ previous_release.stdout }}"
        dest: "{{ app_current_link }}"
        state: link
        force: yes

    - name: Restart queue workers
      command: "{{ php_binary }} {{ app_current_link }}/artisan queue:restart"
      changed_when: false
      failed_when: false

    - name: Clear cache after rollback
      command: "{{ php_binary }} {{ app_current_link }}/artisan config:clear"
      changed_when: false
