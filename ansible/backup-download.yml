---
# ansible/backup-download.yml
#
# Optional operational playbook. Archives the deployed backend directory on the
# target host and downloads the resulting tar.gz to the control machine.
#
# Usage:
#   ansible-playbook ansible/backup-download.yml -i ansible/inventory/staging.ini
#   ansible-playbook ansible/backup-download.yml -i ansible/inventory/production.ini
#   ansible-playbook ansible/backup-download.yml -i ansible/inventory/staging.ini -e backup_include_env=true
#
# Primary workflow:
#   harden.yml -> reboot -> bootstrap-pod.yml -> deploy-pod.yml
#   backup-download.yml is run later only when a local backup is needed.

- name: Backup deployed backend and download it locally
  hosts: all
  become: false
  gather_facts: true

  vars:
    project_root: "{{ ansible_env.HOME }}/easy-green-project"
    deploy_dir: "{{ project_root }}/backend"
    remote_backup_dir: "{{ project_root }}/backups"
    backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    backup_filename: "easy-green-backend-{{ inventory_hostname }}-{{ backup_timestamp }}.tar.gz"
    remote_backup_path: "{{ remote_backup_dir }}/{{ backup_filename }}"
    local_backup_dir: "{{ playbook_dir }}/backups/{{ inventory_hostname }}"
    cleanup_remote_backup: true
    backup_include_env: false
    backup_exclude_patterns:
      - "backend/.agents"
      - "backend/.claude"
      - "backend/.codex"
      - "backend/.gemini"
      - "backend/.github"
      - "backend/.vscode"
      - "backend/server.log"
      - "backend/database/database.sqlite"
      - "backend/storage/logs"
      - "backend/storage/framework/cache"
      - "backend/storage/framework/sessions"
      - "backend/storage/framework/testing"
      - "backend/storage/framework/views"
      - "backend/bootstrap/cache"

  tasks:
    - name: Check deployed backend directory exists
      ansible.builtin.stat:
        path: "{{ deploy_dir }}"
      register: deploy_dir_stat

    - name: Fail if deployed backend directory is missing
      ansible.builtin.fail:
        msg: "Deployed backend directory not found at {{ deploy_dir }}"
      when: not deploy_dir_stat.stat.exists

    - name: Ensure remote backup directory exists
      ansible.builtin.file:
        path: "{{ remote_backup_dir }}"
        state: directory
        mode: "0755"

    - name: Build list of excluded patterns for archive
      ansible.builtin.set_fact:
        backup_archive_exclude_patterns: >-
          {{
            backup_exclude_patterns
            + ([] if backup_include_env | bool else ['backend/.env'])
          }}

    - name: Create compressed backend archive on remote host
      ansible.builtin.shell: |
        set -euo pipefail
        tar -czf "{{ remote_backup_path }}" \
        {% for pattern in backup_archive_exclude_patterns %}
          --exclude={{ pattern | quote }} \
        {% endfor %}
          backend
      args:
        chdir: "{{ project_root }}"
        executable: /bin/bash

    - name: Ensure local backup directory exists
      ansible.builtin.file:
        path: "{{ local_backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: Download backend archive to the control machine
      ansible.builtin.fetch:
        src: "{{ remote_backup_path }}"
        dest: "{{ local_backup_dir }}/"
        flat: true

    - name: Remove remote archive after download
      ansible.builtin.file:
        path: "{{ remote_backup_path }}"
        state: absent
      when: cleanup_remote_backup | bool

    - name: Show local backup path
      ansible.builtin.debug:
        msg: >-
          Backup downloaded to {{ local_backup_dir }}/{{ backup_filename }}.
          backup_include_env={{ backup_include_env | bool }}
