---
# ansible/beszel-containers.yml
#
# Install Beszel agent for Docker container monitoring.
# Monitors: Container CPU, RAM, network stats
#
# Security: Read-only socket (ro) - agent can only READ stats, not control
#
# Prerequisites:
#   1. Get key/token from Beszel UI: Settings → Tokens
#
# Usage:
#   ansible-playbook ansible/beszel-containers.yml -i ansible/inventory/staging.ini
#     -e beszel_key="ssh-ed25519 AAA..." -e beszel_token="xxx..."

- name: Install Beszel container monitoring agent
  hosts: all
  become: true
  gather_facts: false

  vars:
    deploy_user: "{{ ansible_user }}"
    beszel_agent_name: beszel-container-agent
    beszel_data_dir: "/opt/beszel"
    docker_socket: "/var/run/docker.sock"

  tasks:
    - name: Get user UID
      ansible.builtin.command:
        cmd: "id -u {{ deploy_user }}"
      register: user_uid
      changed_when: false

    - name: Stop existing container agent
      become: true
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        cmd: "docker stop {{ beszel_agent_name }} || true"
      failed_when: false
      changed_when: false

    - name: Remove existing container agent
      become: true
      become_user: "{{ deploy_user }}"
      ansible.builtin.command:
        cmd: "docker rm {{ beszel_agent_name }} || true"
      failed_when: false
      changed_when: false

    - name: Start container agent with read-only socket
      become: true
      become_user: "{{ deploy_user }}"
      block:
        - name: Run agent with Docker socket (read-only)
          ansible.builtin.command:
            cmd: >
              docker run -d
              --name {{ beszel_agent_name }}
              --user {{ user_uid.stdout }}
              --restart unless-stopped
              --read-only
              --cap-drop ALL
              --security-opt no-new-privileges:true
              --tmpfs /tmp
              -v {{ beszel_data_dir }}/container_agent_data:/var/lib/beszel-agent
              -v {{ docker_socket }}:{{ docker_socket }}:ro
              -e DOCKER_HOST=unix://{{ docker_socket }}
              -e KEY={{ beszel_key }}
              -e TOKEN={{ beszel_token }}
              henrygd/beszel-agent:1.7.2

    - name: Display info
      ansible.builtin.debug:
        msg: |
          ================================================
          Beszel container agent installed
          ================================================

          Agent mounts Docker socket as READ-ONLY (:ro)
          Security: Agent can read stats, not control containers

          To add containers in Beszel UI:
          1. Go to Settings → Tokens (create if not exists)
          2. Add System with this host
          3. Agent connects to read-only socket for container stats

          Security: Read-only socket (:ro)
          User: {{ deploy_user }} ({{ user_uid.stdout }})