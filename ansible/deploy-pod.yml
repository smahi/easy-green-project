---
# ansible/deploy-pod.yml
#
# Main application deploy playbook. Run this after bootstrap-pod.yml on the
# first deploy, then run it again for every later release.
#
# Usage:
#   ansible-playbook ansible/deploy-pod.yml -i ansible/inventory/staging.ini
#   ansible-playbook ansible/deploy-pod.yml -i ansible/inventory/production.ini
#   ansible-playbook ansible/deploy-pod.yml -i ansible/inventory/staging.ini --tags build
#   ansible-playbook ansible/deploy-pod.yml -i ansible/inventory/staging.ini --tags deploy
#
# Prerequisites on the target host:
#   - Podman, pasta, and rsync installed
#   - Port 80 unprivileged binding enabled
#   - Project directory exists at {{ deploy_dir }}

- name: Deploy Laravel backend with a rootless Podman pod
  hosts: staging
  become: false

  vars:
    project_root: "{{ ansible_env.HOME }}/easy-green-project"
    deploy_dir: "{{ project_root }}/backend"
    pod_data_dir: "{{ project_root }}/data"

    db_bind_path: "{{ pod_data_dir }}/db"
    valkey_bind_path: "{{ pod_data_dir }}/valkey"
    caddy_data_bind_path: "{{ pod_data_dir }}/caddy-data"
    caddy_config_bind_path: "{{ pod_data_dir }}/caddy-config"
    app_storage_bind_path: "{{ pod_data_dir }}/app-storage"
    app_bootstrap_cache_bind_path: "{{ pod_data_dir }}/app-bootstrap-cache"

    systemd_user_dir: "{{ ansible_env.HOME }}/.config/systemd/user"
    user_runtime_dir: "/run/user/{{ ansible_user_uid }}"
    pod_service_name: "easy-green-pod.service"
    legacy_compose_service_name: "podman-compose-myapp.service"

    app_image: "easygreen-app:latest"
    pod_name: "easygreen-pod"
    db_container_name: "easygreen-db"
    valkey_container_name: "easygreen-valkey"
    app_container_name: "easygreen-app"
    queue_container_name: "easygreen-queue"
    scheduler_container_name: "easygreen-scheduler"
    caddy_container_name: "easygreen-caddy"

    pod_publish_ports:
      - "80:80"
    pod_caddy_config: "caddy/Caddyfile.staging"
    legacy_compose_containers:
      - myapp_app_1
      - myapp_queue_1
      - myapp_scheduler_1
      - myapp_caddy_1
      - myapp_db_1
      - myapp_valkey_1
    legacy_compose_networks:
      - myapp_backend
      - podman

  tasks:
    - name: Ensure project directory exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Sync backend source to VM
      ansible.posix.synchronize:
        src: "{{ playbook_dir }}/../backend/"
        dest: "{{ deploy_dir }}/"
        delete: true
        recursive: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=vendor"
          - "--exclude=.env"
          - "--exclude=public/build"
          - "--exclude=storage/logs/*"
          - "--exclude=storage/framework/cache/*"
          - "--exclude=storage/framework/sessions/*"
          - "--exclude=storage/framework/views/*"
          - "--exclude=bootstrap/cache/*.php"
      tags: [sync, build]

    - name: Copy .env to VM if it does not already exist
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../backend/.env"
        dest: "{{ deploy_dir }}/.env"
        mode: "0600"
        force: false
      tags: [sync]

    - name: Ensure critical .env variables are correct for Podman pod stack
      ansible.builtin.lineinfile:
        path: "{{ deploy_dir }}/.env"
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: 'APP_URL', value: "http://{{ ansible_host }}" }
        - { key: 'SANCTUM_STATEFUL_DOMAINS', value: "{{ ansible_host }}" }
        - { key: 'DB_HOST', value: '127.0.0.1' }
        - { key: 'DB_PORT', value: '5432' }
        - { key: 'DB_CONNECTION', value: 'pgsql' }
        - { key: 'REDIS_HOST', value: '127.0.0.1' }
        - { key: 'REDIS_PORT', value: '6379' }
        - { key: 'SESSION_DRIVER', value: 'redis' }
        - { key: 'SESSION_SECURE_COOKIE', value: 'false' }
        - { key: 'SESSION_ENCRYPT', value: 'false' }
        - { key: 'CACHE_STORE', value: 'redis' }
        - { key: 'QUEUE_CONNECTION', value: 'redis' }
      tags: [sync, deploy]

    - name: Build app image
      ansible.builtin.command:
        cmd: >
          podman build
          --file docker/app.Dockerfile
          --tag {{ app_image }}
          .
        chdir: "{{ deploy_dir }}"
      register: build_result
      changed_when: build_result.rc == 0
      tags: [build]

    - name: Recreate and start Podman pod stack
      ansible.builtin.include_tasks: tasks/pod_stack.yml
      tags: [deploy]

    - name: Verify Laravel boots inside app container
      ansible.builtin.command:
        cmd: "podman exec {{ app_container_name }} php artisan --version"
        chdir: "{{ deploy_dir }}"
      register: artisan_version
      changed_when: false
      tags: [deploy]

    - name: Wait for app to respond on port 80
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}"
        status_code: [200, 301, 302]
        timeout: 30
      register: smoke
      retries: 12
      delay: 5
      until: smoke.status in [200, 301, 302]
      tags: [deploy, smoke]

    - name: Deployment complete
      ansible.builtin.debug:
        msg: "App is live at http://{{ ansible_host }} (HTTP {{ smoke.status }})"
      tags: [deploy, smoke]
