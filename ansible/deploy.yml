---
- name: Deploy Laravel application
  hosts: all
  become: yes
  gather_facts: no

  vars:
    app_local_artifact: "./release.tar.gz"

  vars_files:
    - vault.yml

  roles:
    - laravel
    - node
    - supervisor

  tasks:

    # =========================
    # POST DEPLOY ACTIONS
    # =========================

    - name: Restart queue workers
      command: "{{ php_binary }} {{ app_current_link }}/artisan queue:restart"
      args:
        chdir: "{{ app_current_link }}"
      changed_when: false
      failed_when: false

    - name: Clear OPcache safely
      command: "{{ php_binary }} -r 'if (function_exists(\"opcache_reset\")) opcache_reset();'"
      changed_when: false
      failed_when: false

  tags:
    - deploy
