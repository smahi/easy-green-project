name: myapp

services:

  # ── App (FrankenPHP) ────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: myapp_app:latest          # explicit tag → podman-compose won't try to pull it
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_NAME: ":8080"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - backend

  # ── Caddy (reverse proxy / TLS) ────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
        #- "443:443"
        #- "443:443/udp"
    volumes:
      #- ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro # for production
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - backend

  # ── PostgreSQL 18 ───────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Valkey ──────────────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning --requirepass ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Queue worker ────────────────────────────────────────────────────────────
  queue:
    image: myapp_app:latest          # reuse the image built by the app service
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - backend

  # ── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    image: myapp_app:latest          # reuse the same image
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "schedule:work"]
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - backend

volumes:
  db_data:
  valkey_data:
  caddy_data:
  caddy_config:
  app_storage:
  app_bootstrap_cache:

networks:
  backend:
