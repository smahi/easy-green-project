; ── PHP production settings ───────────────────────────────────────────────────

[PHP]
; Error handling – never expose errors to browser in production
display_errors = Off
log_errors     = On
error_log      = /proc/self/fd/2   ; forward to container stdout

; Limits
memory_limit       = 256M
max_execution_time = 60
upload_max_filesize = 32M
post_max_size       = 32M

; Timezone – change to match your server
date.timezone = UTC

[opcache]
opcache.enable                 = 1
opcache.enable_cli             = 0
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files  = 20000
opcache.validate_timestamps    = 0   ; 0 = no file-stat checks in production
opcache.save_comments          = 1   ; required by Laravel
opcache.fast_shutdown          = 1
opcache.jit                    = tracing
opcache.jit_buffer_size        = 64M

[session]
session.cookie_httponly = 1
session.cookie_secure   = 1
session.cookie_samesite = Lax
